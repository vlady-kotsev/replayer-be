services:
  postgres:
    image: postgres:18.1-alpine3.23
    container_name: replayer-db
    environment:
      POSTGRES_DB: replayer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - replayer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  replayer_postgres_data:
